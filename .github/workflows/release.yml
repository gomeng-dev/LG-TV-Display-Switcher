name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build app
        run: cargo build --release --bin LG-TV-Display-Switcher

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build NSIS installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $makensis = (Get-Command makensis -ErrorAction SilentlyContinue).Source
          if (-not $makensis) {
            $makensis = Join-Path ${env:ProgramFiles(x86)} "NSIS\makensis.exe"
          }
          $appBinary = (Get-ChildItem target/release -Filter "LG*Display*Switcher*.exe" | Select-Object -First 1).FullName
          if (-not $appBinary) {
            Get-ChildItem target/release
            throw "Built application executable was not found."
          }
          $defaultConfig = (Resolve-Path installer/DefaultConfig.cfg).Path
          $ensureDisplayConfig = (Resolve-Path installer/EnsureDisplayConfig.ps1).Path
          $installerOutput = Join-Path (Resolve-Path dist).Path "LG-TV-Display-Switcher-Setup.exe"
          & $makensis "/DAPP_BINARY=$appBinary" "/DDEFAULT_CONFIG=$defaultConfig" "/DENSURE_DISPLAY_CONFIG=$ensureDisplayConfig" "/DINSTALLER_OUTPUT=$installerOutput" installer/LG-TV-Display-Switcher.nsi

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/LG-TV-Display-Switcher.exe dist/LG-TV-Display-Switcher.exe
          Compress-Archive -Path dist/LG-TV-Display-Switcher.exe, dist/LG-TV-Display-Switcher-Setup.exe -DestinationPath dist/LG-TV-Display-Switcher-windows-x64.zip -Force

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          ./scripts/Get-ReleaseNotes.ps1 -Version $version -OutputPath dist/release-notes.md

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LG-TV-Display-Switcher-windows-x64
          path: |
            dist/LG-TV-Display-Switcher.exe
            dist/LG-TV-Display-Switcher-Setup.exe
            dist/LG-TV-Display-Switcher-windows-x64.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-notes.md
          files: |
            dist/LG-TV-Display-Switcher.exe
            dist/LG-TV-Display-Switcher-Setup.exe
            dist/LG-TV-Display-Switcher-windows-x64.zip
